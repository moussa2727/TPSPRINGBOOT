<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Liste des rendez-vous</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-body">
                <h1 class="card-title h3 mb-4 text-primary">Liste des rendez-vous</h1>
                <p class="text-muted">Aujourd'hui : <span th:text="${today}"></span></p>
                <table class="table table-striped table-bordered">
                    <thead class="table-dark">
                        <tr>
                            <th>Date</th>
                            <th>Remarque</th>
                            <th>Patient</th>
                            <th>Médecin</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${rdvs}">
                            <td th:text="${r.date}"></td>
                            <td th:text="${r.remarque}"></td>
                            <td th:text="${r.patient != null} ? ${r.patient.nom} : ''"></td>
                            <td th:text="${r.medecin != null} ? ${r.medecin.nom} : ''"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>

</html>
